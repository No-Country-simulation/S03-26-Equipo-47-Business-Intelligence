# ============================================
# SUSTAINABLE GROWTH MONITOR
# Configuración de Fuentes de Datos
# Versión: 1.0
# Última actualización: 2026-03-27
# ============================================

# ============================================
# CONFIGURACIÓN GLOBAL
# ============================================
global:
  encoding: "utf-8"
  date_format: "%Y-%m-%d"
  fail_fast: true # Detiene todo si un archivo crítico falla
  log_level: "INFO"
  log_file: "data/logs/etl.log"
  default_aggregation: "sum" # Agregación por defecto para métricas

# ============================================
# CATÁLOGO DE MÉTRICAS (Referencia)
# ============================================
metric_catalog:
  - id: 1
    name: "Ingresos"
    category: "Financiera"
    subcategory: "Ventas"
    unit: "ARS"
    aggregation: "sum"
    description: "Suma de todas las ventas en el período"

  - id: 2
    name: "Costo Compras"
    category: "Financiera"
    subcategory: "Insumos"
    unit: "ARS"
    aggregation: "sum"
    description: "Total de compras a proveedores"

  - id: 3
    name: "Gasto Personal"
    category: "Financiera"
    subcategory: "Recursos Humanos"
    unit: "ARS"
    aggregation: "sum"
    description: "Suma de salarios y bonos"

  - id: 4
    name: "Consumo Energético Total"
    category: "E"
    subcategory: "Energía"
    unit: "kWh"
    aggregation: "sum"
    description: "Consumo total de energía (electricidad + gas convertido a kWh)"

  - id: 5
    name: "Tasa de Reciclaje"
    category: "E"
    subcategory: "Residuos"
    unit: "%"
    aggregation: "avg"
    description: "Porcentaje de residuos reciclados sobre total generado"

  - id: 6
    name: "Satisfacción Laboral"
    category: "S"
    subcategory: "Clima"
    unit: "puntos (1-10)"
    aggregation: "avg"
    description: "Promedio de satisfacción general de empleados"

  - id: 7
    name: "Horas de Capacitación"
    category: "S"
    subcategory: "Desarrollo"
    unit: "horas"
    aggregation: "sum"
    description: "Total de horas de formación por período"

  - id: 8
    name: "Tasa de Accidentabilidad"
    category: "S"
    subcategory: "Seguridad"
    unit: "días"
    aggregation: "sum"
    description: "Total de días de baja por accidentes laborales"

  - id: 9
    name: "Ingresos por Empleado"
    category: "Financiera"
    subcategory: "Productividad"
    unit: "ARS/empleado"
    aggregation: "avg"
    description: "Relación ingresos totales / número de empleados"
    is_derived: true
    formula: "metric_1 / count_empleados"

  - id: 10
    name: "Intensidad Energética"
    category: "E"
    subcategory: "Eficiencia"
    unit: "kWh/ARS"
    aggregation: "avg"
    description: "Consumo energético por unidad de ingreso"
    is_derived: true
    formula: "metric_4 / metric_1"

# ============================================
# FUENTES DE DATOS
# ============================================
sources:
  # ---------- 1. COMPRAS A PROVEEDORES ----------
  compras:
    file: "compras_proveedor.csv"
    path: "data/raw/"
    format: csv
    delimiter: ","
    encoding: "utf-8"
    special_handling: none
    skip_rows: 0
    date_columns:
      - fecha_emision
      - fecha_pago
    required_columns:
      - fecha_emision
      - monto_ars
    validations:
      monto_ars:
        min: 0
        type: float
    metric_id: 2
    metric_name: "Costo Compras"
    aggregation: "sum"
    group_by_period: "month"
    notes: "Las compras se agregan por mes según fecha de emisión"

  # ---------- 2. CONSUMO ENERGÉTICO ----------
  consumo_energetico:
    file: "consumo_energetico.csv"
    path: "data/raw/"
    format: csv
    delimiter: ","
    encoding: "utf-8"
    special_handling: merge_energy # Une electricidad + gas por mes
    date_columns:
      - fecha
    required_columns:
      - fecha
      - kwh_consumidos
      - m3_gas
    validations:
      kwh_consumidos:
        min: 0
        type: float
      m3_gas:
        min: 0
        type: float
    # Conversión: 1 m³ de gas natural ≈ 10.69 kWh
    conversion_factors:
      gas_to_kwh: 10.69
    derived_columns:
      - name: "kwh_totales"
        formula: "kwh_consumidos + (m3_gas * conversion_factors.gas_to_kwh)"
        description: "Suma de electricidad + gas convertido a kWh"
    metric_id: 4
    metric_name: "Consumo Energético Total"
    unit: "kWh"
    aggregation: "sum"
    group_by_period: "month"

  # ---------- 3. NÓMINA DE PERSONAL (FORMATO ESPECIAL) ----------
  personal_nomina:
    file: "personal_nomina.csv"
    path: "data/raw/"
    format: csv
    delimiter: ","
    encoding: "utf-8"
    special_handling: nested_quotes # Maneja comillas anidadas
    quotechar: '"'
    doublequote: true
    skip_rows: 0
    date_columns:
      - mes # En realidad es fecha completa "YYYY-MM-DD"
      - fecha_ingreso
    required_columns:
      - total_devengado
      - mes
    validations:
      total_devengado:
        min: 0
        type: float
    metric_id: 3
    metric_name: "Gasto Personal"
    aggregation: "sum"
    group_by_period: "month"
    notes: "El archivo tiene comillas anidadas. Usar quoting=1 y doublequote=True en pandas"

  # ---------- 4. RESIDUOS Y RECICLAJE ----------
  residuos_reciclaje:
    file: "residuos_reciclaje.csv"
    path: "data/raw/"
    format: csv
    delimiter: ","
    encoding: "utf-8"
    special_handling: none
    date_columns:
      - fecha_semana
    required_columns:
      - kg_generados
      - kg_reciclados
    validations:
      kg_generados:
        min: 0
        type: float
      kg_reciclados:
        min: 0
        type: float
    derived_columns:
      - name: "tasa_reciclaje"
        formula: "(kg_reciclados / kg_generados) * 100"
        description: "Porcentaje de residuos reciclados"
        unit: "%"
    metric_id: 5
    metric_name: "Tasa de Reciclaje"
    aggregation: "avg"
    group_by_period: "month"
    notes: "Agregación mensual: promedio de tasa semanal"

  # ---------- 5. ENCUESTAS DE CLIMA ----------
  encuestas_clima:
    file: "encuestas_clima.csv"
    path: "data/raw/"
    format: csv
    delimiter: ","
    encoding: "utf-8"
    special_handling: none
    date_columns:
      - fecha_encuesta
    required_columns:
      - fecha_encuesta
      - satisfaccion_gral
      - id_empleado
    validations:
      satisfaccion_gral:
        min: 0
        max: 10
        type: float
    metric_id: 6
    metric_name: "Satisfacción Laboral"
    aggregation: "avg"
    group_by_period: "quarter"
    notes: "Se usa satisfaccion_gral como métrica principal. Se promedia por trimestre"

  # ---------- 6. EVENTOS RRHH (Capacitaciones y Accidentes) ----------
  eventos_rrhh:
    file: "eventos_rrhh.csv"
    path: "data/raw/"
    format: csv
    delimiter: ","
    encoding: "utf-8"
    special_handling: none
    date_columns:
      - fecha
    required_columns:
      - fecha
      - tipo_evento
    validations:
      horas_capacitacion:
        min: 0
        type: float
      dias_baja:
        min: 0
        type: int
    # Métricas múltiples desde el mismo archivo
    derived_metrics:
      - metric_id: 7
        name: "Horas de Capacitación"
        column: "horas_capacitacion"
        aggregation: "sum"
      - metric_id: 8
        name: "Tasa de Accidentabilidad"
        column: "dias_baja"
        aggregation: "sum"
        filter: "tipo_evento == 'Accidente Laboral'"
    group_by_period: "month"
    notes: "Este archivo genera dos métricas diferentes"

  # ---------- 7. VENTAS TRANSACCIONES ----------
  ventas:
    file: "ventas_transacciones.csv"
    path: "data/raw/"
    format: csv
    delimiter: ","
    encoding: "utf-8"
    special_handling: none
    date_columns:
      - fecha
    required_columns:
      - fecha
      - subtotal_ars
      - cantidad
    validations:
      subtotal_ars:
        min: 0
        type: float
      cantidad:
        min: 1
        type: int
    metric_id: 1
    metric_name: "Ingresos"
    aggregation: "sum"
    group_by_period: "month"
    notes: "Se suma subtotal_ars para obtener ingresos totales por período"

  # ---------- 8. DIMENSIÓN EMPLEADO (desde nómina) ----------
  empleados:
    file: "personal_nomina.csv" # Misma fuente que nómina
    path: "data/raw/"
    format: csv
    delimiter: ","
    encoding: "utf-8"
    special_handling: nested_quotes
    is_dimension: true # Esta es una tabla de dimensión
    use_for_dimension: "empleado"
    dimension_columns:
      - id_empleado
      - nombre
      - area
      - genero
      - fecha_ingreso
    notes: "Extrae la información única de empleados para la dimensión"

# ============================================
# RELACIONES ENTRE TABLAS (para el modelo estrella)
# ============================================
relationships:
  fact_mediciones:
    foreign_keys:
      - id_fecha -> dim_tiempo.id_fecha
      - id_metrica -> dim_metrica.id_metrica
      - id_area -> dim_area.id_area
      - id_empleado -> dim_empleado.id_empleado # opcional

  dim_tiempo:
    source: "generated" # Se genera desde todas las fechas
    date_columns_from_sources:
      - compras.fecha_emision
      - consumo_energetico.fecha
      - personal_nomina.mes
      - residuos_reciclaje.fecha_semana
      - encuestas_clima.fecha_encuesta
      - eventos_rrhh.fecha
      - ventas.fecha

  dim_area:
    source: "extracted"
    columns_from_sources:
      - personal_nomina.area
      - encuestas_clima.area
      - eventos_rrhh.area

  dim_empleado:
    source: "personal_nomina"
    unique_key: "id_empleado"

  dim_metrica:
    source: "metric_catalog" # Usa el catálogo definido arriba
